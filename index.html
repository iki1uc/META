<h1>META – Public‑Ebene</h1>

<div id="meta"></div>

<script type="module">
    import { AX_forward } from "../AX/forward.js";
    import { IS_state } from "../IS/state.js";
    import { XA_return } from "../XA/return.js";

    // NC‑Systemführung
    AX_forward();
    IS_state();
    XA_return();

    // META‑Frames laden (deckend)
    const frames = [
        "comet.html",
        "kosmos.html",
        "systeme.html",

        "axis_nul.html",
        "axis_bir.html",
        "axis_uc.html",
        "axis_ma3.html",

        "markt3.html",
        "public.html",
        "dreifach.html",
        "neutral.html",
        "sinn7.html"
    ];

    frames.forEach(file => {
        fetch(file)
            .then(r => r.text())
            .then(t => meta.innerHTML += t);
    });
</script>
